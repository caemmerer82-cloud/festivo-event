# Eventmanager – Nginx vhost template
# This file is generated automatically by install.sh.
# For reference / manual installation, copy to /etc/nginx/sites-available/festivo-event
# and adjust the paths and server_name as needed.

server {
    listen 80;
    server_name your-domain.example.com;   # or _ for IP-only

    root /opt/festivo-event/frontend/dist;
    index index.html;

    # React SPA – serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP API – proxy to PHP-FPM (Slim 4 – all requests go to index.php)
    location /api/ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm-festivo-event.sock;
        fastcgi_param SCRIPT_FILENAME /opt/festivo-event/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Security
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # File uploads up to 11 MB (MAX_UPLOAD_SIZE + overhead)
    client_max_body_size 11M;

    access_log /var/log/nginx/festivo-event-access.log;
    error_log  /var/log/nginx/festivo-event-error.log;
}

