# Eventmanager – Nginx vhost template
# This file is generated automatically by install.sh.
# For reference / manual installation, copy to /etc/nginx/sites-available/eventmanager
# and adjust the paths and server_name as needed.

server {
    listen 80;
    server_name your-domain.example.com;   # or _ for IP-only

    root /opt/eventmanager/frontend/dist;
    index index.html;

    # React SPA – serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP API – proxy to PHP-FPM
    location /api/ {
        alias /opt/eventmanager/backend/public/;
        try_files $uri /api/index.php$is_args$args;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm-eventmanager.sock;
            fastcgi_param SCRIPT_FILENAME /opt/eventmanager/backend/public/index.php;
        }
    }

    # Security
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # File uploads up to 11 MB (MAX_UPLOAD_SIZE + overhead)
    client_max_body_size 11M;

    access_log /var/log/nginx/eventmanager-access.log;
    error_log  /var/log/nginx/eventmanager-error.log;
}

